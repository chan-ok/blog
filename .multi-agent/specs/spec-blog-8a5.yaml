metadata:
  id: 'spec-blog-8a5'
  title: 'dashboard.sh 버그 수정 및 기능 개선 (BUG-1~5/FEAT-1)'
  created_at: '2026-02-22T00:00:00Z'
  created_by: 'spec-manager'
  status: 'active'
  target_file: '.multi-agent/scripts/dashboard.sh'
  reference_specs:
    - 'spec-blog-w5x.yaml'
    - 'spec-blog-2dn.yaml'

requirements:
  functional:
    - 'draw_overview() 내 %.Ns 바이트 자르기를 %s로 교체하여 한글 제목 잘림 수정 (BUG-1)'
    - 'bd list grep 패턴을 실제 출력 형식에 맞게 수정하여 에이전트 idle 고정 버그 해소 (BUG-2)'
    - 'overview 메인루프에서 논블로킹 키 입력으로 spec 필터 전환 (BUG-3)'
    - 'draw_dots max 하드코딩 8을 터미널 너비 기반 동적 계산으로 교체 (BUG-4)'
    - 'draw_agent_pane에 작업 통계·경과시간·beads ID·대기 메시지 수 표시 (BUG-5/FEAT-1)'

  non_functional:
    - '멀티바이트(한글) 안전 처리 유지 — trunc_title awk 기반 함수 시그니처 변경 금지'
    - 'tput 기반 동적 너비 계산 유지'
    - 'clear 명령어 사용 금지 (\033[H 방식 유지)'
    - 'bash 3.2 호환 (macOS 기본 bash)'

  constraints:
    - '.multi-agent/scripts/dashboard.sh 단일 파일 수정만 허용'
    - 'trunc_title() 함수 시그니처 변경 금지'
    - 'sleep 5 메인루프 구조 유지 (read -t 0 논블로킹으로 추가)'
    - 'blog-etb, blog-gcy 완료 후 blog-acr, blog-nv8 진행'
    - 'blog-e4l은 blog-etb/blog-gcy와 독립적으로 병렬 작업 가능'

tasks:
  - beads_id: 'blog-etb'
    title: 'FIX: dashboard.sh BUG-1 한글 잘림 (%.Ns → %s)'
    description: |
      draw_overview() 내 pln() 호출에서 %.Ns 포맷 스트링을 %s로 교체.
      trunc_title()이 이미 너비 기준으로 자른 $t를
      pln 내에서 추가로 %.Ns 바이트 자르기 하지 않도록 수정.
      수정 위치 5곳.
    priority: 0
    depends_on: []
    target_lines: '152, 170, 179, 195, 214'
    fix_approach: |
      ① 152라인 (Agents 섹션):
        현재: pln "  %b ${D}${ag_pad}${R} ${D}%.$(( W - 22 ))s${R}" "$icon" "$task_title"
        수정: pln "  %b ${D}${ag_pad}${R} ${D}%s${R}" "$icon" "$task_title"

      ② 170라인 (Todos in_progress):
        현재: pln "  ${YLW}◐${R} ${D}%.$(( W - 6 ))s${R}" "$t"
        수정: pln "  ${YLW}◐${R} ${D}%s${R}" "$t"

      ③ 179라인 (Todos open):
        현재: pln "  ${D}○ %.$(( W - 6 ))s${R}" "$t"
        수정: pln "  ${D}○ %s${R}" "$t"

      ④ 195라인 (BLOCKED):
        현재: pln "  ${RED}● %.$(( W - 6 ))s${R}" "$t"
        수정: pln "  ${RED}● %s${R}" "$t"

      ⑤ 214라인 (Done):
        현재: pln "  ${GRN}✓${R} ${D}%.$(( W - 6 ))s${R}" "$t"
        수정: pln "  ${GRN}✓${R} ${D}%s${R}" "$t"

      trunc_title로 이미 너비 기준 안전 자르기 완료된 $t를 %s로 그대로 출력.

  - beads_id: 'blog-gcy'
    title: 'FIX: dashboard.sh BUG-2 에이전트 상태 항상 idle 표시'
    description: |
      draw_overview() agents 루프 및 draw_agent_pane() 내
      _ip_raw=$(bd list ...) + grep 패턴 수정.
      실제 bd list 출력 접두 아이콘 확인 후 grep 패턴 정확히 맞춤.
      in_progress 없으면 open fallback 로직 유지.
    priority: 0
    depends_on: []
    target_lines: '133-134 (draw_overview), 274-277 (draw_agent_pane)'
    fix_approach: |
      [사전 확인]
      작업 전 실제 bd list 출력 형식 확인:
        bd list --assignee task-manager -s in_progress
        bd list -s in_progress
        bd list -s open
        bd list -s blocked
        bd list -s closed
      출력 접두 아이콘 확인: ◐(U+25D0), ○(U+25CB), ●(U+25CF), ✓(U+2713) 등

      [draw_overview Agents 루프 — 133-134라인]
        현재:
          _ip_raw=$(bd list --assignee "$ag" -s in_progress 2>/dev/null | grep "^◐" || true)
          _bl_raw=$(bd list --assignee "$ag" -s blocked     2>/dev/null | grep "^●" || true)
        수정: 실제 출력 확인 후 grep 패턴을 일치하는 아이콘으로 교체.
        패턴이 올바른 경우 변경 불필요.
        패턴 불일치 시: grep "^<실제아이콘>" 또는 grep "" (전체 줄) 로 대체.

      [draw_agent_pane — 274-277라인]
        현재:
          _ip_raw=$(bd list --assignee "$ASSIGNEE" -s in_progress 2>/dev/null | grep "^◐" || true)
          _op_raw=$(bd list --assignee "$ASSIGNEE" -s open        2>/dev/null | grep "^○"  || true)
          _bl_raw=$(bd list --assignee "$ASSIGNEE" -s blocked     2>/dev/null | grep "^●"  || true)
          _cl_raw=$(bd list --assignee "$ASSIGNEE" -s closed      2>/dev/null | grep "^✓"  || true)
        수정: 각 상태별 실제 아이콘과 grep 패턴 일치 확인 후 필요 시 교체.

      [검증]
      수정 후 in_progress 태스크가 있는 에이전트의 Agents 섹션 아이콘이
      · 대신 ◐로 표시되는지 확인.

  - beads_id: 'blog-e4l'
    title: 'FIX: dashboard.sh BUG-4 draw_dots max=8 하드코딩'
    description: |
      draw_agent_pane() 내 draw_dots 호출부(321라인) 수정.
      dot_max를 W/3으로 동적 계산 후 draw_dots 인자로 전달.
      최소 4, 최대 20으로 클램프.
    priority: 0
    depends_on: []
    target_lines: '321'
    fix_approach: |
      현재 코드 (319-322라인):
        # ④ 도트 진행도
        printf "  "
        draw_dots "$ag_cl" "$ag_total"
        printf '\033[K\n'

      수정 후:
        # ④ 도트 진행도
        local dot_max=$(( W / 3 ))
        [ $dot_max -lt 4  ] && dot_max=4
        [ $dot_max -gt 20 ] && dot_max=20
        printf "  "
        draw_dots "$ag_cl" "$ag_total" "$dot_max"
        printf '\033[K\n'

      draw_dots() 함수 시그니처 및 내부 로직 변경 없음.
      (이미 max=${3:-8} 파라미터로 인자를 받도록 구현됨)

      클램프 예시:
        W=30  → dot_max=10
        W=60  → dot_max=20 (상한 적용)
        W=15  → dot_max=5
        W=10  → dot_max=4  (하한 적용)

  - beads_id: 'blog-acr'
    title: 'FEAT: dashboard.sh BUG-3 spec 필터 키 입력 처리'
    description: |
      overview 메인루프 내 sleep 이전 논블로킹 키 입력 감지(read -t 0 -n 1 key).
      ACTIVE_SPEC 변수(초기값 "") 관리: 숫자 1-9는 spec 선택, 0/a는 전체 복귀.
      헤더에 [전체] 또는 [spec: 파일명] 표시.
      ACTIVE_SPEC 설정 시 Todos/Done 섹션 spec 연관 태스크 필터링.
    priority: 1
    depends_on: ['blog-etb', 'blog-gcy']
    fix_approach: |
      [1] 전역 변수 추가 (파일 상단 _EXIT=0 근처):
        ACTIVE_SPEC=""  # 빈 문자열 = 전체 표시

      [2] 메인루프 내 draw_overview 호출 직전에 키 입력 감지 추가 (357-367라인):
        현재:
          while [ "$_EXIT" -eq 0 ]; do
            case "$AGENT" in
              overview)     draw_overview     ;;
              ...
            esac
            sleep 5 &
            wait $!
          done

        수정:
          while [ "$_EXIT" -eq 0 ]; do
            # 논블로킹 키 입력 감지 (overview 전용)
            if [ "$AGENT" = "overview" ]; then
              if read -t 0 -r -s -n1 _key 2>/dev/null; then
                case "$_key" in
                  [0a]) ACTIVE_SPEC="" ;;
                  [1-9])
                    _idx=$(( _key - 1 ))
                    _i=0
                    for _sf in "$PROJECT_ROOT/.multi-agent/specs/"spec-*.yaml; do
                      [ -f "$_sf" ] || continue
                      case "$_sf" in *archive*) continue ;; esac
                      if [ "$_i" -eq "$_idx" ]; then
                        ACTIVE_SPEC="$(basename "$_sf")"
                        break
                      fi
                      _i=$(( _i + 1 ))
                    done
                    ;;
                esac
              fi
            fi
            case "$AGENT" in
              overview)     draw_overview     ;;
              ...
            esac
            sleep 5 &
            wait $!
          done

        주의: bash 3.2 호환 — 배열 미사용, for 루프로 spec 파일 순회.

      [3] draw_overview() 헤더(①, 108라인)에 ACTIVE_SPEC 표시 추가:
        현재:
          pln "${CLR}${B} OVERVIEW${R}  ${D}$(date '+%H:%M:%S')${R}"

        수정:
          if [ -z "$ACTIVE_SPEC" ]; then
            pln "${CLR}${B} OVERVIEW${R}  ${D}$(date '+%H:%M:%S')${R}"
          else
            pln "${CLR}${B} OVERVIEW${R}  ${D}$(date '+%H:%M:%S')${R}  ${D}[${CYN}${ACTIVE_SPEC}${R}${D}]${R}"
          fi

      [4] Todos/Done 섹션에서 ACTIVE_SPEC 필터 적용:
        ACTIVE_SPEC이 비어있으면 기존 로직 그대로.
        ACTIVE_SPEC이 설정된 경우:
          spec 파일에서 beads_id 목록 파싱:
            _spec_ids=$(grep "beads_id:" "$PROJECT_ROOT/.multi-agent/specs/$ACTIVE_SPEC" \
              | awk -F"'" '{print $2}' | tr '\n' '|' | sed 's/|$//')

          bd list 결과를 해당 ID로 필터링:
            _todo_ip=$(bd list -s in_progress 2>/dev/null | grep "^◐" \
              | grep -E "$_spec_ids" || true)
            _todo_pd=$(bd list -s open 2>/dev/null | grep "^○" \
              | grep -E "$_spec_ids" || true)

        Done 섹션도 동일하게 필터 적용.

  - beads_id: 'blog-nv8'
    title: 'FEAT: dashboard.sh BUG-5/FEAT-1 에이전트 pane 통계+경과시간'
    description: |
      draw_agent_pane()에 추가:
      (A) 작업 통계 요약 1줄 (진행/대기/완료)
      (B) in_progress 경과시간 (bd show 타임스탬프 파싱, macOS date -j 형식)
      (C) in_progress beads ID 표시
      (D) task-manager/spec-manager 전용 대기 메시지 수
    priority: 1
    depends_on: ['blog-etb', 'blog-gcy', 'blog-e4l']
    target_lines: '319-322 이후 (draw_dots 블록 다음)'
    fix_approach: |
      draw_dots 블록(④) 다음, 블로커 블록(⑤) 이전에 아래 코드 삽입:

      # ④-A 작업 통계 요약
      pln "  ${YLW}◐진행 %-2s${R}  ${D}○대기 %-2s${R}  ${GRN}✓완료 %-2s${R}" \
        "$ag_ip" "$ag_op" "$ag_cl"

      # ④-B in_progress 경과시간 + ④-C beads ID
      local _ip_id
      _ip_id=$(printf "%s" "$_ip_raw" | head -1 | awk '{print $2}')
      if [ -n "$_ip_id" ]; then
        pln "  ${D}ID: %s${R}" "$_ip_id"
        local _ts
        _ts=$(bd show "$_ip_id" 2>/dev/null \
          | grep -i "updated\|created" | head -1 | awk '{print $NF}')
        if [ -n "$_ts" ]; then
          local _now; _now=$(date +%s)
          local _then
          # macOS: date -j, Linux: date -d 분기
          _then=$(date -j -f "%Y-%m-%dT%H:%M:%SZ" "$_ts" +%s 2>/dev/null \
            || date -d "$_ts" +%s 2>/dev/null \
            || echo 0)
          local _diff=$(( _now - _then ))
          local _h=$(( _diff / 3600 ))
          local _m=$(( (_diff % 3600) / 60 ))
          if [ "$_h" -gt 0 ]; then
            pln "  ${D}경과 ${_h}h ${_m}m${R}"
          else
            pln "  ${D}경과 ${_m}m${R}"
          fi
        fi
      fi

      # ④-D 대기 메시지 수 (task-manager / spec-manager 전용)
      if [ "$AGENT" = "task-manager" ] || [ "$AGENT" = "spec-manager" ]; then
        local _msg_raw
        _msg_raw=$(bd list --assignee "$ASSIGNEE" --type message -s open \
          2>/dev/null | grep "^○" || true)
        local _msg_cnt; _msg_cnt=$(count_lines "$_msg_raw")
        [ "$_msg_cnt" -gt 0 ] && \
          pln "  ${CYN}▸${R} ${D}대기 메시지 ${_msg_cnt}건${R}"
      fi

      주의:
        - spec-manager 전용 ⑥ 블록(332-343라인)은 기존 유지
        - 대기 메시지 수(④-D)와 spec-manager ⑥ 블록은 중복되지 않음
          (④-D는 모든 message 타입, ⑥는 request_spec 레이블 특화)

acceptance_criteria:
  - condition: 'dashboard.sh 내 "%.$((" 패턴이 존재하지 않음 (%.Ns 완전 제거)'
    verification: 'Grep 도구로 %.$(( 패턴 검색 결과 없음 확인'

  - condition: '한글 제목을 포함한 Todos/Done/BLOCKED/Agents 항목이 터미널 너비 내에서 올바르게 표시됨'
    verification: '한글 포함 태스크 존재 시 overview 시각적 확인, 글자 잘림 없음'

  - condition: 'in_progress 태스크가 있는 에이전트의 Agents 섹션 아이콘이 ◐ 표시됨 (· 아님)'
    verification: 'bd list --assignee worker-1 -s in_progress 결과가 있을 때 overview 확인'

  - condition: 'draw_overview 및 draw_agent_pane의 grep 패턴이 실제 bd list 출력 아이콘과 일치'
    verification: 'Read 도구로 수정된 grep 패턴 확인, bd list 실행 결과와 대조'

  - condition: 'draw_dots가 W/3으로 계산한 dot_max 값으로 렌더링됨 (최소 4, 최대 20)'
    verification: 'Read 도구로 draw_agent_pane 내 dot_max 계산 코드 확인'

  - condition: 'overview 숫자 키 1~9 입력 시 해당 spec으로 필터 전환, 헤더에 spec 파일명 표시'
    verification: '실행 후 헤더에 [spec: 파일명] 표시 확인'

  - condition: 'overview 키 0 또는 a 입력 시 ACTIVE_SPEC="" 로 전체 보기 복귀'
    verification: '0 키 입력 후 헤더에 spec 표시 없음 확인'

  - condition: 'draw_agent_pane에 통계 줄(◐진행 N ○대기 N ✓완료 N)이 도트 진행도 아래에 표시됨'
    verification: 'worker-1 또는 task-manager pane에서 통계 줄 확인'

  - condition: 'in_progress 작업이 있는 에이전트 pane에서 경과시간(Xh Ym 또는 Nm)이 표시됨'
    verification: 'in_progress 태스크 존재 시 "경과 Xh Ym" 또는 "경과 Nm" 줄 표시 확인'

  - condition: 'in_progress beads ID가 "ID: blog-xxxx" 형태로 pane에 표시됨'
    verification: 'pane에서 "ID: " 텍스트 확인'

  - condition: 'task-manager / spec-manager pane에서 대기 메시지 수가 표시됨 (0건이면 미표시)'
    verification: 'message 타입 open 아이템 존재 시 "대기 메시지 X건" 텍스트 확인'

  - condition: 'bash -n .multi-agent/scripts/dashboard.sh 구문 오류 없음'
    verification: 'bash -n 명령어 실행 결과 오류 없음 확인'

technical_notes:
  - '%.Ns 근본 원인: printf %.Ns는 N 바이트 자르기로 한글(UTF-8, 3바이트)이 중간에 잘림. trunc_title()이 이미 출력 너비 기준 안전 자르기 완료 — %s로 그대로 출력해야 함'
  - 'idle 고정 근본 원인: grep "^◐" 패턴이 실제 bd list 출력 접두 아이콘과 불일치 가능. 작업 전 실제 bd list 실행 후 출력 형식 확인 필수'
  - 'read -t 0: 타임아웃 0초 논블로킹 read, 입력 없으면 즉시 exit code != 0 반환 (set -e 없어 안전)'
  - 'bash 3.2: spec 파일 목록 순회 시 배열 불가 → for 루프 + 인덱스 카운터 사용'
  - 'macOS date -j 형식: date -j -f "%Y-%m-%dT%H:%M:%SZ" <ts> +%s / Linux: date -d <ts> +%s — 양쪽 분기 필수'
  - 'draw_dots max 클램프: W=30 → 10, W=60 이상 → 20(상한), W=10 이하 → 4(하한)'
  - 'blog-acr(spec 필터)와 blog-nv8(통계+경과시간)은 각각 blog-etb, blog-gcy 완료 후 진행. 두 FEAT 태스크는 서로 독립적'

execution_order:
  phase_1_parallel:
    - 'blog-etb: BUG-1 한글 잘림 수정 (독립)'
    - 'blog-gcy: BUG-2 idle 고정 수정 (독립)'
    - 'blog-e4l: BUG-4 draw_dots 하드코딩 수정 (독립)'
  phase_2_parallel:
    - 'blog-acr: BUG-3 spec 필터 (blog-etb, blog-gcy 완료 후)'
    - 'blog-nv8: BUG-5/FEAT-1 통계+경과시간 (blog-etb, blog-gcy, blog-e4l 완료 후)'
