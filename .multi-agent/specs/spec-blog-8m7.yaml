metadata:
  id: 'spec-blog-8m7'
  title: '멀티 에이전트 타이밍 설정 통합 config.json'
  created_at: '2026-02-22T00:00:00Z'
  created_by: 'spec-manager'
  status: 'active'
  parent_task: 'blog-iwp'
  target_files:
    - '.multi-agent/config.json'
    - '.multi-agent/scripts/dispatcher.sh'
    - '.multi-agent/scripts/runner.sh'

requirements:
  functional:
    - '흩어진 타이밍 설정값을 .multi-agent/config.json 한 곳에서 통합 관리'
    - 'config.json 수정만으로 dispatcher/runner 타이밍 일괄 변경 가능'
    - 'dispatcher.sh 설정 섹션이 config.json 값을 jq로 읽어 적용'
    - 'runner.sh POLL_INTERVAL 하드코딩을 config.json runner_poll_interval로 대체'

  non_functional:
    - '환경변수 우선순위 유지: 환경변수 > config.json > 기본값'
    - 'jq 미설치 환경에서 기존 기본값으로 자동 fallback'
    - 'config.json 파일 미존재 시에도 기존 기본값으로 자동 fallback'
    - 'dispatcher.sh/runner.sh 기존 동작 완전 유지'

  constraints:
    - 'bash 3.2 호환 (declare -A 미사용)'
    - 'jq 미설치 fallback 필수'
    - 'blog-74d 완료 후 blog-0pm, blog-je7 진행 (blog-74d에 의존)'
    - 'blog-0pm과 blog-je7은 서로 독립적으로 병렬 작업 가능'

tasks:
  - beads_id: 'blog-74d'
    title: 'CONFIG: .multi-agent/config.json 신규 생성'
    description: |
      타이밍 설정값 통합 관리를 위한 config.json 파일을 신규 생성.
      dispatcher.sh와 runner.sh가 공통으로 참조하는 타이밍 설정값을 한 곳에서 관리.
    priority: 0
    depends_on: []
    target_file: '.multi-agent/config.json'
    file_content: |
      {
        "dispatcher_poll_interval": 10,
        "agent_gap": 1,
        "bd_max_retry": 3,
        "stale_timeout": 1800,
        "runner_poll_interval": 3
      }
    key_descriptions:
      dispatcher_poll_interval: '전체 순환 주기 초 (dispatcher.sh POLL_INTERVAL, 기존 기본값 5 → 10으로 변경)'
      agent_gap: '에이전트 간 bd 접근 간격 초 (dispatcher.sh AGENT_GAP, 기존 기본값 1 유지)'
      bd_max_retry: 'bd panic 재시도 횟수 (dispatcher.sh BD_MAX_RETRY, 기존 기본값 3 유지)'
      stale_timeout: 'in_progress 최대 허용 시간 초 (dispatcher.sh STALE_TIMEOUT, 기존 기본값 1800 유지)'
      runner_poll_interval: '폴링 간격 초 (runner.sh POLL_INTERVAL, 기존 하드코딩 값 3 유지)'

  - beads_id: 'blog-0pm'
    title: 'REFACTOR: dispatcher.sh config.json 연동'
    description: |
      dispatcher.sh 설정 섹션(36-39라인)에서 jq로 config.json 값을 읽도록 수정.
      우선순위: 환경변수 > config.json > 기존 기본값.
      POLL_INTERVAL 기본값 5→10 반영.
      jq 미설치 또는 config.json 미존재 시 기존 기본값 유지.
    priority: 1
    depends_on: ['blog-74d']
    target_file: '.multi-agent/scripts/dispatcher.sh'
    target_lines: '36-39'
    fix_approach: |
      현재 코드 (36-39라인):
        POLL_INTERVAL="${POLL_INTERVAL:-5}"      # 전체 순환 주기 (초)
        AGENT_GAP="${AGENT_GAP:-1}"             # 에이전트 간 bd 접근 간격 (초)
        BD_MAX_RETRY="${BD_MAX_RETRY:-3}"       # bd panic 재시도 횟수
        STALE_TIMEOUT="${STALE_TIMEOUT:-1800}"  # stale in_progress 임계값 (초, 기본 30분)

      수정 후 (36-39라인 교체):
        # config.json 값 읽기 헬퍼 (jq 미설치 또는 파일 없을 시 기본값 반환)
        _cfg() {
          local key="$1" default="$2"
          if command -v jq >/dev/null 2>&1 && [ -f "$PROJECT_ROOT/.multi-agent/config.json" ]; then
            local val
            val=$(jq -r ".$key // empty" "$PROJECT_ROOT/.multi-agent/config.json" 2>/dev/null)
            [ -n "$val" ] && echo "$val" && return
          fi
          echo "$default"
        }
        POLL_INTERVAL="${POLL_INTERVAL:-$(_cfg dispatcher_poll_interval 10)}"  # 전체 순환 주기 (초)
        AGENT_GAP="${AGENT_GAP:-$(_cfg agent_gap 1)}"                          # 에이전트 간 bd 접근 간격 (초)
        BD_MAX_RETRY="${BD_MAX_RETRY:-$(_cfg bd_max_retry 3)}"                 # bd panic 재시도 횟수
        STALE_TIMEOUT="${STALE_TIMEOUT:-$(_cfg stale_timeout 1800)}"           # stale in_progress 임계값 (초)

      주의: _cfg 헬퍼 함수는 설정 섹션 내에 인라인으로 정의하여
            PROJECT_ROOT 변수가 이미 설정된 이후(35라인 이후)에 위치해야 함.

  - beads_id: 'blog-je7'
    title: 'REFACTOR: runner.sh config.json 연동'
    description: |
      runner.sh 164라인의 POLL_INTERVAL=3 하드코딩을
      config.json runner_poll_interval 값으로 대체.
      jq 미설치 또는 config.json 없을 시 기본값 3으로 fallback.
    priority: 1
    depends_on: ['blog-74d']
    target_file: '.multi-agent/scripts/runner.sh'
    target_lines: '164'
    fix_approach: |
      현재 코드 (164라인):
        POLL_INTERVAL=3  # 폴링 간격 (초)

      수정 후 (164라인 교체):
        # config.json에서 runner_poll_interval 읽기 (jq 미설치 또는 파일 없을 시 기본값 3)
        _runner_cfg_poll() {
          if command -v jq >/dev/null 2>&1 && [ -f "$PROJECT_ROOT/.multi-agent/config.json" ]; then
            local val
            val=$(jq -r '.runner_poll_interval // empty' "$PROJECT_ROOT/.multi-agent/config.json" 2>/dev/null)
            [ -n "$val" ] && echo "$val" && return
          fi
          echo "3"
        }
        POLL_INTERVAL="${POLL_INTERVAL:-$(_runner_cfg_poll)}"  # 폴링 간격 (초)

      주의: PROJECT_ROOT는 15라인에서 이미 설정되므로 164라인에서 참조 가능.
            환경변수 POLL_INTERVAL이 설정된 경우 config.json 값보다 우선.

acceptance_criteria:
  - condition: '.multi-agent/config.json 파일이 존재하고 5개 키를 포함'
    verification: 'Read 도구로 config.json 파일 내용 확인, dispatcher_poll_interval/agent_gap/bd_max_retry/stale_timeout/runner_poll_interval 키 존재 확인'

  - condition: 'config.json의 dispatcher_poll_interval 값이 10'
    verification: 'Read 도구로 config.json 확인'

  - condition: 'dispatcher.sh에 _cfg() 헬퍼 함수가 존재하고 jq 조건 분기 포함'
    verification: 'Read 도구로 dispatcher.sh 설정 섹션 확인, command -v jq 패턴 존재 확인'

  - condition: 'dispatcher.sh POLL_INTERVAL 기본값이 5에서 10으로 변경됨'
    verification: 'Grep 도구로 dispatcher_poll_interval 또는 :- 10 패턴 검색'

  - condition: 'dispatcher.sh에서 환경변수 POLL_INTERVAL 설정 시 config.json 값보다 우선 적용'
    verification: 'Read 도구로 "${POLL_INTERVAL:-$(_cfg ...)} 패턴 확인'

  - condition: 'runner.sh 164라인의 POLL_INTERVAL=3 하드코딩이 config.json 연동 코드로 교체됨'
    verification: 'Read 도구로 runner.sh 164라인 확인, POLL_INTERVAL=3 단순 하드코딩 미존재 확인'

  - condition: 'runner.sh에서 jq 미설치 또는 config.json 미존재 시 POLL_INTERVAL 기본값 3 사용'
    verification: 'Read 도구로 _runner_cfg_poll() 함수의 fallback echo "3" 확인'

  - condition: 'bash -n .multi-agent/scripts/dispatcher.sh 구문 오류 없음'
    verification: 'bash -n 명령어로 구문 오류 없음 확인'

  - condition: 'bash -n .multi-agent/scripts/runner.sh 구문 오류 없음'
    verification: 'bash -n 명령어로 구문 오류 없음 확인'

technical_notes:
  - 'blog-74d 완료 후 blog-0pm과 blog-je7을 병렬로 진행 가능'
  - '_cfg() 헬퍼는 dispatcher.sh 전용, _runner_cfg_poll()은 runner.sh 전용으로 각자 인라인 정의'
  - 'jq -r ".key // empty" 패턴: 키 미존재 시 null 대신 빈 문자열 반환하여 fallback 처리 용이'
  - 'dispatcher.sh PROJECT_ROOT는 35라인에서 설정되므로 _cfg() 정의는 35라인 이후에 위치해야 함'
  - 'runner.sh PROJECT_ROOT는 15라인에서 설정되므로 164라인에서 참조 가능'
  - 'POLL_INTERVAL 기본값 변경 (5→10): dispatcher.sh 헤더 주석(18라인)도 함께 업데이트 권장'
