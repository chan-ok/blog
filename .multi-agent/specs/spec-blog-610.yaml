requirements:
  functional:
    - '상태 아이콘을 원형(○/◐/●/✓)에서 사각형(□/■)으로 전면 교체'
    - 'ACTIVE_SPEC이 설정된 경우 overview 헤더 구분선 아래에 spec 제목(1줄) + 기능 요구사항(최대 3줄) 표시'
    - 'overview pane에서 s/f/스페이스/엔터 키 입력 시 spec 선택 TUI 모달 오픈'
    - '에이전트 pane(draw_agent_pane)에서 ACTIVE_SPEC 기반으로 bd list 쿼리에 --label 필터 적용'

  non_functional:
    - 'bash 3.2 호환 필수 (macOS 기본 bash, declare -A 사용 불가, read -t 정수만 가능)'
    - 'clear 명령어 사용 금지 — \033[H 커서 홈 방식 유지'
    - 'trunc_title() 함수 시그니처 변경 금지'
    - '깜빡임 없는 갱신 방식(begin_frame → \033[H) 유지'
    - 'stty 기반 raw mode: bash 3.2 ESC 시퀀스 읽기 방식 유지 (stty min 0 time 2 → read -rn1 → stty min 1 time 0)'

  constraints:
    - 'bash 스크립트 수정만 필요 (TypeScript/Node.js 무관)'
    - 'blog-7fd는 독립적으로 진행 가능'
    - 'blog-naj(TUI 모달)가 blog-yjm, blog-d1z의 선행 조건'
    - 'blog-yjm, blog-d1z는 blog-naj 완료 후 병렬 진행 가능'
    - '/tmp/multi-agent-active-spec 파일로 spec 상태 공유 (빈 문자열 = 전체 표시)'
    - '테스트는 수동 실행으로 확인 (자동화 테스트 불필요)'

tasks:
  - beads_id: 'blog-7fd'
    title: 'ICON: dashboard.sh 상태 아이콘 원형→사각형 교체'
    status: 'completed'
    commit: '833b3ff'
    description: |
      dashboard.sh 전체에서 사용 중인 원형 아이콘을 사각형으로 교체한다.
      대기(open): □ (dim), 진행중(in_progress): ■ (yellow),
      완료(closed): ■ (green), 블록/취소(blocked): ■ (red).
      현재 ○/◐/●/✓ 기호를 전부 교체 대상.
    priority: 0
    depends_on: []
    target_areas:
      - 'get_stats() 함수 (80-90라인): grep "^◐" → grep "^■", grep "^○" → grep "^□" 등 grep 패턴 교체'
      - 'draw_overview() 함수 ④ 에이전트별 상태 (151-172라인): icon 변수 할당 로직의 아이콘 문자 교체'
      - 'draw_overview() 함수 ⑤ Todos 섹션 (176-206라인): ■/□ 아이콘 출력 확인 (이미 교체된 경우 유지)'
      - 'draw_overview() 함수 ⑥ 블로커 강조 (208-220라인): ■ 아이콘 확인'
      - 'draw_overview() 함수 ⑦ 최근 완료 (222-243라인): ■ 아이콘 확인'
      - 'draw_agent_pane() 함수 ② 헤더 아이콘 (502-508라인): icon 변수 할당 로직의 아이콘 문자 교체'
      - 'draw_dots() 함수 (251-267라인): ● → ■, ○ → □ 교체'
    fix_approach: |
      get_stats()의 grep 패턴:
        현재: grep "^◐" / grep "^○" / grep "^●" / grep "^✓"
        변경: grep "^■" / grep "^□" (bd list 출력 형식에 맞게 조정)

      draw_dots()의 도트 출력:
        현재: printf "${GRN}■ ${R}" (filled), printf "${D}□ ${R}" (empty)
        확인: 이미 ■/□로 되어 있다면 색상 매핑만 검토
          - filled: ${GRN}■ (green)
          - empty:  ${D}□  (dim)

      draw_overview() ④ Agents 아이콘:
        현재 (151-153라인):
          if   [ "$ag_bl" -gt 0 ]; then icon="${RED}■${R}"
          elif [ "$ag_ip" -gt 0 ]; then icon="${YLW}■${R}"
          else                           icon="${D}□${R}"
        → 이미 사각형 사용 중, 유지

      draw_agent_pane() ② 헤더 아이콘:
        현재 (504-508라인):
          if   [ "$ag_bl" -gt 0 ]; then icon="${RED}■${R}"
          elif [ "$ag_ip" -gt 0 ]; then icon="${YLW}■${R}"
          elif [ "$ag_op" -gt 0 ]; then icon="${D}□${R}"
          else                           icon="${D}□${R}"
        → 이미 사각형 사용 중, 유지

      주의: bd list 출력 접두사가 실제로 어떤 문자를 사용하는지 확인 후
      grep 패턴을 정확히 맞출 것. bd 출력을 직접 확인하거나
      grep "." 방식으로 모든 줄을 선택하는 방어적 패턴 고려.

  - beads_id: 'blog-naj'
    title: 'SPEC_TUI: dashboard.sh 스펙 선택 TUI 모달 구현'
    status: 'completed'
    commit: '4745d4a'
    description: |
      overview pane에서 s/f/스페이스/엔터 키 입력 시 모달 오픈.
      ↑↓(또는 j/k) 이동, Enter 확정, q/ESC 취소.
      확정 시 /tmp/multi-agent-active-spec 파일에 선택된 spec 파일명 저장
      (전체 보기는 빈 문자열).
      bash 3.2 호환: stty -icanon min 0 time 1 -echo (모달 진입 시),
      stty icanon min 1 time 0 echo (종료 시 복원).
      ESC 시퀀스 읽기: stty min 0 time 2 → read -rn1 → stty min 1 time 0 복원 방식.
    priority: 0
    depends_on: []
    target_areas:
      - 'show_spec_modal() 함수 신규 추가 (269-457라인에 이미 구현 존재 — 현재 코드 확인 필수)'
      - '메인 루프 (577-606라인): overview pane에서 키 입력 감지 및 show_spec_modal() 호출 로직'
    fix_approach: |
      주의: dashboard.sh 269-457라인에 show_spec_modal() 함수가 이미 구현되어 있음.
      메인 루프 587-594라인에 키 감지 및 호출 로직도 구현되어 있음.

      현재 구현 상태 확인 후:
        1. 이미 정상 동작한다면 수정 불필요 → acceptance_criteria 검증만 수행
        2. 버그가 있는 경우만 수정

      spec 파일 목록 수집: .multi-agent/specs/spec-*.yaml (archive 제외)
      선택 저장: printf "%s" "$_result" > "$ACTIVE_SPEC_FILE"
      ACTIVE_SPEC 전역변수도 동시에 갱신.

      stty 명령 실패 시 || true 처리 필수 (터미널이 아닌 환경 대비).

  - beads_id: 'blog-yjm'
    title: 'SPEC_HEADER: dashboard.sh overview 헤더 아래 스펙 설명 표시'
    status: 'completed'
    commit: '4836fac'
    description: |
      ACTIVE_SPEC이 설정된 경우, overview 헤더 구분선(sep) 바로 아래에
      해당 spec YAML에서 metadata.title(1줄) + requirements.functional 항목
      최대 3줄을 awk/grep으로 파싱하여 표시.
      ACTIVE_SPEC 값은 /tmp/multi-agent-active-spec 파일에서 읽도록 변경
      (현재는 전역변수 ACTIVE_SPEC만 사용).
      draw_overview() 함수 내 sep() 호출 직후(122라인 이후)에 삽입.
    priority: 1
    depends_on: ['blog-naj']
    target_lines: '116-138 (draw_overview 헤더 + sep 구간)'
    fix_approach: |
      삽입 위치: draw_overview() 함수의 sep "$W" 호출(122라인) 직후

      추가할 코드 (bash 3.2 호환, awk/grep 사용):
        if [ -n "$ACTIVE_SPEC" ]; then
          local spec_path="$PROJECT_ROOT/.multi-agent/specs/$ACTIVE_SPEC"
          if [ -f "$spec_path" ]; then
            # metadata.title 파싱
            local spec_title
            spec_title=$(grep "^  title:" "$spec_path" | head -1 \
              | sed "s/^  title: *//" | tr -d "'\"")
            [ -n "$spec_title" ] && pln "  ${CYN}${B}%s${R}" "$(trunc_title "$spec_title" $(( W - 4 )))"

            # requirements.functional 항목 최대 3줄 파싱
            local func_items
            func_items=$(awk '/^  functional:/,/^  [a-z_]+:/' "$spec_path" \
              | grep "^    - " | head -3 | sed "s/^    - //" | tr -d "'\"")
            if [ -n "$func_items" ]; then
              while IFS= read -r item; do
                [ -z "$item" ] && continue
                pln "  ${D}· %s${R}" "$(trunc_title "$item" $(( W - 6 )))"
              done <<< "$func_items"
            fi
            sep "$W"
          fi
        fi

      주의: ACTIVE_SPEC 변수 갱신 로직을 파일 읽기 방식으로 통일할 경우
      draw_overview() 진입 시 한 번만 읽도록 처리 (성능).
      현재 메인 루프(581-586라인)에 외부 변경 반영 로직이 있으므로
      전역변수 ACTIVE_SPEC은 항상 최신 상태임 — 추가 파일 읽기 불필요.

  - beads_id: 'blog-d1z'
    title: 'AGENT_FILTER: dashboard.sh 에이전트 pane spec 필터 연동'
    status: 'completed'
    commit: 'd41b407'
    description: |
      draw_agent_pane()에서 매 사이클마다 ACTIVE_SPEC 값을 반영하여
      bd list 쿼리에 --label 조건부 추가, spec 필터 적용.
      _ip_raw, _op_raw, _bl_raw, _cl_raw 집계 4개 모두 필터 적용 대상.
      get_active_spec() 헬퍼 함수 신규 추가 필요.
    priority: 1
    depends_on: ['blog-naj']
    target_lines: '484-566 (draw_agent_pane 함수 전체)'
    fix_approach: |
      1. get_active_spec() 함수 추가 (draw_agent_pane 앞에 배치):
        get_active_spec() {
          if [ -f "$ACTIVE_SPEC_FILE" ]; then
            cat "$ACTIVE_SPEC_FILE" 2>/dev/null || true
          else
            printf "%s" "$ACTIVE_SPEC"
          fi
        }

      2. draw_agent_pane() ① 상태 집계 (491-494라인) 수정:
        현재:
          _ip_raw=$(bd list --assignee "$ASSIGNEE" -s in_progress 2>/dev/null | grep "^◐" || true)
          _op_raw=$(bd list --assignee "$ASSIGNEE" -s open        2>/dev/null | grep "^○"  || true)
          _bl_raw=$(bd list --assignee "$ASSIGNEE" -s blocked     2>/dev/null | grep "^●"  || true)
          _cl_raw=$(bd list --assignee "$ASSIGNEE" -s closed      2>/dev/null | grep "^✓"  || true)

        변경 후:
          local _active_spec; _active_spec=$(get_active_spec)
          local _spec_filter=""
          [ -n "$_active_spec" ] && _spec_filter="--label $_active_spec"
          _ip_raw=$(bd list --assignee "$ASSIGNEE" -s in_progress $_spec_filter 2>/dev/null | grep "^." || true)
          _op_raw=$(bd list --assignee "$ASSIGNEE" -s open        $_spec_filter 2>/dev/null | grep "^." || true)
          _bl_raw=$(bd list --assignee "$ASSIGNEE" -s blocked     $_spec_filter 2>/dev/null | grep "^." || true)
          _cl_raw=$(bd list --assignee "$ASSIGNEE" -s closed      $_spec_filter 2>/dev/null | grep "^." || true)

      주의: grep 패턴은 아이콘 교체(blog-7fd) 완료 후 실제 bd 출력 접두사에 맞게 조정.
      _spec_filter를 unquoted 변수로 사용 시 빈 문자열이면 옵션이 추가되지 않음 (bash 동작).

acceptance_criteria:
  - condition: 'get_stats()에서 진행중 태스크가 올바르게 집계됨'
    verification: 'dashboard.sh overview 모드 실행 후 ■ 진행 수치와 bd list -s in_progress 결과 건수 대조'

  - condition: 'draw_dots()에서 filled 도트는 GRN ■, empty 도트는 D □로 표시됨'
    verification: 'dashboard.sh 각 에이전트 pane 실행 후 도트 색상 시각 확인'

  - condition: 'ACTIVE_SPEC 설정 시 overview 헤더 구분선 바로 아래에 spec 제목이 cyan 색상으로 1줄 표시됨'
    verification: '/tmp/multi-agent-active-spec에 spec 파일명 설정 후 overview 모드 실행하여 시각 확인'

  - condition: 'ACTIVE_SPEC 설정 시 spec 제목 아래에 requirements.functional 항목이 최대 3줄 표시됨'
    verification: '/tmp/multi-agent-active-spec에 spec 파일명 설정 후 overview 모드 실행하여 시각 확인'

  - condition: 'ACTIVE_SPEC 미설정(빈 문자열) 시 spec 설명 섹션이 표시되지 않음'
    verification: '/tmp/multi-agent-active-spec을 빈 문자열로 설정 후 overview 모드 실행하여 헤더 구분선 바로 아래에 추가 섹션 없음 확인'

  - condition: 'overview pane에서 s 키 입력 시 스펙 선택 TUI 모달이 화면 중앙에 표시됨'
    verification: 'dashboard.sh overview 모드 실행 중 s 키 입력, 모달 팝업 시각 확인'

  - condition: 'TUI 모달에서 ↑↓(또는 j/k) 키로 spec 목록 이동, Enter로 확정, q/ESC로 취소 가능'
    verification: '모달 내 각 키 입력 동작 시각 확인'

  - condition: 'TUI 모달에서 spec 선택 확정 시 /tmp/multi-agent-active-spec 파일에 파일명이 저장됨'
    verification: '모달에서 spec 선택 후 cat /tmp/multi-agent-active-spec 실행하여 파일명 확인'

  - condition: 'TUI 모달에서 ALL 선택 확정 시 /tmp/multi-agent-active-spec 파일이 빈 문자열로 저장됨'
    verification: '모달에서 ALL 선택 후 cat /tmp/multi-agent-active-spec 실행하여 빈 문자열 확인'

  - condition: 'ACTIVE_SPEC 설정 시 draw_agent_pane()에서 해당 spec 레이블로 필터링된 태스크 수만 집계됨'
    verification: '/tmp/multi-agent-active-spec에 spec 파일명 설정 후 에이전트 pane 진행도가 전체 태스크 수가 아닌 필터된 수를 표시하는지 확인'

  - condition: 'dashboard.sh 구문 오류 없음 (모든 태스크 완료 후)'
    verification: 'bash -n .multi-agent/scripts/dashboard.sh 실행 결과 오류 없음 확인'

