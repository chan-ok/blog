metadata:
  id: 'spec-blog-mzq'
  title: 'dashboard.sh 멀티 에이전트 모니터 개선'
  created_at: '2026-02-22T00:00:00Z'
  created_by: 'spec-manager'
  status: 'deprecated'
  deprecated_reason: 'spec-blog-d1o.yaml이 동일 태스크를 fix_approach 코드 예시 포함하여 더 상세히 커버. spec-blog-d1o.yaml을 authoritative spec으로 사용.'
  deprecated_at: '2026-02-22T00:00:00Z'
  target_file: '.multi-agent/scripts/dashboard.sh'

requirements:
  functional:
    - 'safe_count() 함수(58-65라인) 제거: 실제 호출 코드가 없는 데드 코드이므로 삭제'
    - 'latest_log() 함수(114-126라인) 제거: 실제 호출 코드가 없는 데드 코드이므로 삭제'
    - 'draw_agent_pane() 360라인의 --tag validate_spec을 --label request_spec으로 수정하여 실제 시스템 레이블과 일치'
    - 'draw_overview() Todos 섹션(193-206라인)에서 _todo_ip/_todo_pd가 빈 문자열일 때 루프를 건너뛰는 조건 분기 추가'
    - 'draw_dots()(248-265라인)에서 색상 이스케이프 누적 방식을 printf 직접 출력 방식으로 리팩토링'

  non_functional:
    - 'bash 3.2 호환 (macOS 기본 bash): declare -A 연관 배열 미사용'
    - '기존 렌더링 로직 유지: 깜빡임 없는 갱신 방식(커서 홈, begin_frame) 보존'
    - 'ANSI 이스케이프 코드 기반 색상 표시 유지'

  constraints:
    - 'bash 3.2 호환: declare -A 미사용, 배열 인덱스 없이 처리'
    - '기존 pln/sep/begin_frame/count_lines 헬퍼 함수 변경 금지'
    - '렌더링 출력 결과는 현행과 시각적으로 동일해야 함'
    - '.multi-agent/scripts/dashboard.sh 파일만 수정 대상'

tasks:
  - beads_id: 'blog-kf8'
    title: 'REFACTOR: dashboard.sh 데드 코드 제거 (safe_count, latest_log)'
    description: |
      dashboard.sh에서 호출되지 않는 두 함수를 제거한다.
      - safe_count() (58-65라인): grep -c 출력을 안전하게 정수로 변환하는 함수이나 실제 호출 없음
      - latest_log() (114-126라인): 날짜 폴더 기준으로 최신 에이전트 로그를 찾는 함수이나 실제 호출 없음
      제거 후 함수 주석 블록(55-57라인의 "── 안전한 카운트 헬퍼" 섹션 헤더 포함) 함께 삭제.
    priority: 0
    depends_on: ['blog-5ck']

  - beads_id: 'blog-77k'
    title: 'FIX: dashboard.sh spec-manager 메시지 레이블 수정 (validate_spec → request_spec)'
    description: |
      draw_agent_pane() 내 spec-manager 전용 블록(358-368라인)에서
      --tag validate_spec 을 --label request_spec 으로 수정한다.
      수정 전: bd list --tag validate_spec --assignee spec-manager
      수정 후: bd list --label request_spec --assignee spec-manager
    priority: 0
    depends_on: ['blog-5ck']

  - beads_id: 'blog-5uk'
    title: 'FIX: dashboard.sh draw_overview Todos 섹션 빈 줄 렌더링 버그 수정'
    description: |
      draw_overview() Todos 섹션(193-206라인)에서 _todo_ip 또는 _todo_pd가
      빈 문자열("")일 때 while 루프가 빈 문자열로 1회 실행되어 빈 줄이 출력되는 버그를 수정한다.
      각 while 루프 진입 전에 변수가 비어있으면 건너뛰는 조건을 추가한다.
      수정 방법: 루프 앞에 [ -z "$_todo_ip" ] 조건 분기 추가
    priority: 0
    depends_on: ['blog-5ck']

  - beads_id: 'blog-9bm'
    title: 'REFACTOR: dashboard.sh draw_dots 성능 개선 (dots 문자열 누적 → printf 직접 출력)'
    description: |
      draw_dots()(248-265라인)에서 ANSI 이스케이프가 포함된 dots 문자열을 변수에 누적한 뒤
      printf "%b" 로 한번에 출력하는 방식을 각 도트를 printf로 즉시 출력하는 방식으로 리팩토링한다.
      변경 전: dots 변수에 "${GRN}●${R} " 등을 누적 후 printf "%b ... $dots" 출력
      변경 후: while 루프 내부에서 printf "${GRN}● ${R}" 직접 출력, dots 변수 제거
      blog-kf8 완료 후 진행.
    priority: 1
    depends_on: ['blog-kf8']

acceptance_criteria:
  - condition: 'safe_count() 함수(58-65라인) 코드가 파일에 존재하지 않음'
    verification: 'Grep 도구로 safe_count 패턴 검색 후 미존재 확인'

  - condition: 'latest_log() 함수(114-126라인) 코드가 파일에 존재하지 않음'
    verification: 'Grep 도구로 latest_log 패턴 검색 후 미존재 확인'

  - condition: 'draw_agent_pane spec-manager 블록에 --label request_spec 이 사용됨'
    verification: 'Grep 도구로 request_spec 패턴 검색 후 존재 확인, validate_spec 미존재 확인'

  - condition: '_todo_ip 또는 _todo_pd가 빈 문자열일 때 while 루프가 실행되지 않음'
    verification: '로직 확인: [ -z "$_todo_ip" ] 또는 동등한 조건 분기 존재'

  - condition: 'draw_dots() 내부에서 dots 변수 없이 printf 직접 출력 방식 사용'
    verification: 'Read 도구로 draw_dots 함수 코드 확인, dots="" 누적 패턴 미존재 확인'

  - condition: 'bash .multi-agent/scripts/dashboard.sh overview 실행 시 오류 없이 출력됨'
    verification: 'bash -n .multi-agent/scripts/dashboard.sh 로 구문 오류 없음 확인'

technical_notes:
  - |
    bash 3.2 호환 주의사항:
    - declare -A (연관 배열) 사용 금지
    - read -d 옵션 지원 범위 주의
    - 함수 내 local 변수 선언 시 초기값과 함께 선언하지 않을 것 (일부 bash 3.x 버그)
  - |
    ANSI 이스케이프 변수:
    R='\033[0m' (리셋), B='\033[1m' (볼드), D='\033[2m' (어둡게)
    GRN='\033[0;32m', YLW='\033[1;33m', BLU='\033[0;34m', RED='\033[0;31m'
    printf "%b" 로 이스케이프 해석, pln() 헬퍼로 줄 끝 잔상 제거(\033[K)
  - |
    blog-9bm은 blog-kf8 완료 후 진행.
    blog-kf8, blog-77k, blog-5uk는 blog-5ck에 의존하며 서로 독립적으로 병렬 처리 가능.
