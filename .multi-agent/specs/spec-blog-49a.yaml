requirements:
  functional:
    - 'docs/agents.md에서 목차의 에이전트 시스템 항목(12번째 줄)을 삭제해야 함'
    - 'docs/agents.md에서 핵심 규칙 요약 표의 에이전트 행(71번째 줄)을 삭제해야 함'
    - 'docs/agents.md에서 ## 에이전트 시스템 섹션 전체(100~147번째 줄)를 삭제해야 함'
    - 'docs/agents.md에서 참고 문서 섹션의 multi-agent-system.md 링크(162번째 줄)를 삭제해야 함'
    - 'README.md에서 ## 에이전트 시스템 섹션 전체(175~191번째 줄: v3 에이전트 9종 표 포함)를 삭제해야 함'
    - 'README.md에서 ## 문서 섹션의 agent-system.md 행(198번째 줄)을 삭제해야 함'
    - 'README.md에서 ## 문서 섹션의 agent-permissions.md 행(199번째 줄)을 삭제해야 함'

  non_functional:
    - 'docs/agents.md와 README.md의 삭제 대상 외 모든 내용은 그대로 유지해야 함'
    - 'AGENTS.md는 수정하지 않아야 함'
    - '두 파일 수정 작업은 독립적이므로 병렬 처리 가능'

  constraints:
    - 'AGENTS.md 수정 절대 금지'
    - '문서 삭제 작업이므로 FSD 아키텍처/TypeScript/Tailwind 제약 없음'
    - '각 파일은 독립적으로 수정 가능 (병렬 처리 가능)'

