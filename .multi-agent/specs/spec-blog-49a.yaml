      [삭제 대상 3] ## 에이전트 시스템 섹션 전체 (100~147번째 줄):
        ## 에이전트 시스템
        ~ (v4 역할표, 아키텍처 특징, 시작방법, beads LOCK 규칙 포함)
        ``` (147번째 줄 끝)

