metadata:
  id: 'spec-blog-6d9'
  title: 'pause.sh / resume.sh — 에이전트 일시중단·재시작'
  created_at: '2026-02-22T00:00:00Z'
  created_by: 'spec-manager'
  status: 'completed'
  completed_at: '2026-02-22T00:00:00Z'
  parent_task: 'blog-fnb'
  target_files:
    - '.multi-agent/scripts/pause.sh'
    - '.multi-agent/scripts/resume.sh'

requirements:
  functional:
    - '에이전트 전체(dispatcher + task-manager/spec-manager/worker-1/worker-2)를 중단하고 uncommitted 변경사항을 stash로 보존'
    - 'consultant 창(Window 1)은 일시중단 대상에서 제외'
    - '재시작 시 stash를 복원하고 opencode 및 dispatcher를 재실행'
    - '/tmp/multi-agent-paused 마커 파일로 pause 상태 관리'
    - '/tmp/multi-agent-pause-state.json에 stash된 worktree 목록 기록'
    - 'resume.sh를 pause 없이 실행 시 오류 메시지 출력 후 종료'

  non_functional:
    - 'start.sh / stop.sh 코딩 스타일 완전 준수 (set -e, SESSION_NAME, RED/GREEN/YELLOW/NC)'
    - 'bash 3.2 호환 (macOS 기본 bash) — declare -A 사용 금지'
    - 'jq 없이도 동작 — /tmp/multi-agent-pause-state.json 파싱은 grep/awk fallback 지원'

  constraints:
    - 'bash 3.2 호환: declare -A 미사용'
    - 'jq 미설치 환경 fallback 필수 (grep/awk로 JSON 파싱)'
    - 'consultant 창(Window 1) 미개입'
    - 'worker-1, worker-2의 opencode agent 이름은 worker (start.sh 참고)'
    - 'blog-b19(resume.sh)는 blog-5i1(pause.sh) 완료 후 진행 (/tmp/multi-agent-pause-state.json 구조 일치 필요)'

tasks:
  - beads_id: 'blog-5i1'
    title: 'FEAT: pause.sh 신규 생성 — 에이전트 일시중단'
    status: 'completed'
    description: |
      tmux multi-agent 세션의 dispatcher/에이전트 창에 Ctrl+C 전송 후
      uncommitted changes stash, 마커 파일 생성.
    priority: 0
    depends_on: []
    target_file: '.multi-agent/scripts/pause.sh'
    implementation_steps:
      - step: 1
        description: 'tmux 세션 존재 확인'
        detail: |
          tmux has-session -t "$SESSION_NAME" 2>/dev/null 으로 확인.
          없으면 RED 색상으로 오류 출력 후 exit 1.
      - step: 2
        description: 'dispatcher 창 중단 (Ctrl+C 전송)'
        detail: |
          tmux send-keys -t "${SESSION_NAME}:dispatcher" C-c
          1초 대기 후 다음 단계 진행.
      - step: 3
        description: '에이전트 창 중단 (Ctrl+C 전송)'
        detail: |
          task-manager, spec-manager, worker-1, worker-2 창 순서로 Ctrl+C 전송.
          consultant 창(Window 1)은 건드리지 않음.
          각 창: tmux send-keys -t "${SESSION_NAME}:${agent}" C-c
          전체 전송 후 2초 대기.
      - step: 4
        description: 'git worktree 목록 수집'
        detail: |
          git worktree list --porcelain 출력에서 worktree 경로 추출.
          worktree 경로 패턴: "worktree " 로 시작하는 줄에서 경로 추출.
          예: git worktree list --porcelain | awk '/^worktree /{print $2}'
      - step: 5
        description: '각 worktree uncommitted changes stash'
        detail: |
          각 worktree에 대해:
            1. git -C "$wt_path" status --porcelain 으로 변경사항 확인
            2. 출력이 비어있지 않으면 git -C "$wt_path" stash push -m "multi-agent-pause" 실행
            3. stash 성공 시 stashed_list에 해당 경로 추가 (공백 구분 문자열로 누적)
          bash 3.2 호환: 배열 대신 공백 구분 문자열 사용.
      - step: 6
        description: '/tmp/multi-agent-pause-state.json 생성'
        detail: |
          stashed_list에 기록된 worktree 경로들을 JSON 배열 형식으로 파일에 저장.
          jq 없이 printf/echo로 직접 작성.

          파일 구조:
            {
              "stashed_worktrees": [
                "/path/to/worktree1",
                "/path/to/worktree2"
              ]
            }

          생성 방법 (bash 3.2 호환):
            printf '{\n  "stashed_worktrees": [\n' > /tmp/multi-agent-pause-state.json
            first=1
            for wt_path in $stashed_list; do
              [ "$first" -eq 1 ] && first=0 || printf ',\n' >> /tmp/multi-agent-pause-state.json
              printf '    "%s"' "$wt_path" >> /tmp/multi-agent-pause-state.json
            done
            printf '\n  ]\n}\n' >> /tmp/multi-agent-pause-state.json

          stashed_list가 비어있으면 빈 배열 JSON 저장:
            printf '{\n  "stashed_worktrees": []\n}\n' > /tmp/multi-agent-pause-state.json
      - step: 7
        description: '/tmp/multi-agent-paused 마커 파일 생성'
        detail: |
          touch /tmp/multi-agent-paused
      - step: 8
        description: '완료 메시지 출력'
        detail: |
          GREEN 색상으로 완료 메시지 출력.
          재시작 방법 안내: "재시작하려면: bash .multi-agent/scripts/resume.sh"

  - beads_id: 'blog-b19'
    title: 'FEAT: resume.sh 신규 생성 — 에이전트 재시작'
    status: 'completed'
    description: |
      마커 파일 확인 후 stash pop, 에이전트 opencode 재시작,
      dispatcher 재시작, 마커 파일 삭제.
    priority: 1
    depends_on: ['blog-5i1']
    target_file: '.multi-agent/scripts/resume.sh'
    implementation_steps:
      - step: 1
        description: 'pause 마커 파일 존재 확인'
        detail: |
          [ -f /tmp/multi-agent-paused ] 로 확인.
          없으면 RED 색상으로 오류 출력 후 exit 1.
          오류 메시지 예: "에이전트가 일시중단 상태가 아닙니다. 먼저 pause.sh를 실행하세요."
      - step: 2
        description: 'tmux 세션 존재 확인'
        detail: |
          tmux has-session -t "$SESSION_NAME" 2>/dev/null 으로 확인.
          없으면 RED 색상으로 오류 출력 후 exit 1.
      - step: 3
        description: '/tmp/multi-agent-pause-state.json 읽어 stash 대상 worktree 파악'
        detail: |
          jq 설치 여부에 따라 파싱 방법 분기:

          jq 있는 경우:
            stashed_paths=$(jq -r '.stashed_worktrees[]' /tmp/multi-agent-pause-state.json 2>/dev/null || true)

          jq 없는 경우 (grep/awk fallback):
            stashed_paths=$(grep -oE '"[^"]*"' /tmp/multi-agent-pause-state.json \
              | grep '/' \
              | tr -d '"')

          파일 미존재 시 stashed_paths를 빈 문자열로 처리.
      - step: 4
        description: '각 worktree에서 git stash pop 실행'
        detail: |
          stashed_paths가 비어있지 않을 때만 실행.
          각 경로에 대해:
            git -C "$wt_path" stash pop
          실패 시 YELLOW 경고 출력 후 계속 진행 (set -e 예외 처리: || true).
      - step: 5
        description: '에이전트 창에서 opencode 재시작'
        detail: |
          task-manager, spec-manager, worker-1, worker-2 창 순서로 재시작.
          각 창: tmux send-keys -t "${SESSION_NAME}:${agent}" -l "opencode --agent ${oc_agent}" C-m

          opencode agent 이름 매핑:
            task-manager → task-manager
            spec-manager → spec-manager
            worker-1     → worker
            worker-2     → worker

          case 문으로 매핑:
            case "$agent" in
              worker-*) oc_agent="worker" ;;
              *)        oc_agent="$agent"  ;;
            esac
      - step: 6
        description: '3초 대기 후 dispatcher 재시작'
        detail: |
          sleep 3
          tmux send-keys -t "${SESSION_NAME}:dispatcher" \
            -l "bash $SCRIPTS_DIR/dispatcher.sh" C-m
      - step: 7
        description: '마커 파일 및 state 파일 삭제'
        detail: |
          rm -f /tmp/multi-agent-paused
          rm -f /tmp/multi-agent-pause-state.json
      - step: 8
        description: '완료 메시지 출력'
        detail: |
          GREEN 색상으로 완료 메시지 출력.
          tmux 창 전환 방법 안내.

file_structure:
  pause_sh_skeleton: |
    #!/bin/bash
    # 에이전트 일시중단 스크립트
    # 사용법: bash .multi-agent/scripts/pause.sh

    set -e

    SESSION_NAME="multi-agent"
    PROJECT_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")/../.." && pwd)"
    SCRIPTS_DIR="$PROJECT_ROOT/.multi-agent/scripts"
    PAUSE_MARKER="/tmp/multi-agent-paused"
    PAUSE_STATE="/tmp/multi-agent-pause-state.json"
    AGENTS="task-manager spec-manager worker-1 worker-2"

    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    NC='\033[0m'

    # ... (steps 1~8 구현)

  resume_sh_skeleton: |
    #!/bin/bash
    # 에이전트 재시작 스크립트
    # 사용법: bash .multi-agent/scripts/resume.sh

    set -e

    SESSION_NAME="multi-agent"
    PROJECT_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")/../.." && pwd)"
    SCRIPTS_DIR="$PROJECT_ROOT/.multi-agent/scripts"
    PAUSE_MARKER="/tmp/multi-agent-paused"
    PAUSE_STATE="/tmp/multi-agent-pause-state.json"
    AGENTS="task-manager spec-manager worker-1 worker-2"

    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    NC='\033[0m'

    # ... (steps 1~8 구현)

acceptance_criteria:
  - condition: 'bash -n .multi-agent/scripts/pause.sh 구문 오류 없음'
    verification: 'bash -n 명령어 실행 결과 오류 없음 확인'

  - condition: 'bash -n .multi-agent/scripts/resume.sh 구문 오류 없음'
    verification: 'bash -n 명령어 실행 결과 오류 없음 확인'

  - condition: 'pause.sh 실행 시 /tmp/multi-agent-paused 파일 생성됨'
    verification: '실행 후 [ -f /tmp/multi-agent-paused ] 확인'

  - condition: 'resume.sh 실행 시 /tmp/multi-agent-paused 파일 삭제됨'
    verification: '실행 후 [ ! -f /tmp/multi-agent-paused ] 확인'

  - condition: 'resume.sh를 pause 없이 실행 시 오류 메시지 출력 후 exit 1'
    verification: '/tmp/multi-agent-paused 파일 없는 상태에서 resume.sh 실행, 오류 메시지 및 종료 코드 1 확인'

  - condition: 'pause.sh가 consultant 창(Window 1)에 Ctrl+C를 전송하지 않음'
    verification: 'Read 도구로 pause.sh 소스 확인, consultant 창 대상 send-keys 미존재 확인'

  - condition: 'resume.sh에서 worker-1, worker-2 재시작 시 opencode --agent worker 사용'
    verification: 'Read 도구로 resume.sh 소스 확인, worker-* 매핑 case 문 존재 확인'

  - condition: '/tmp/multi-agent-pause-state.json 이 stashed_worktrees 배열을 포함한 유효한 JSON 형식'
    verification: 'pause.sh 실행 후 파일 내용 확인, stashed_worktrees 키 존재 확인'

  - condition: 'jq 없는 환경에서 resume.sh stashed_paths 파싱이 grep/awk fallback으로 동작'
    verification: 'Read 도구로 resume.sh 소스 확인, command -v jq 조건 분기 및 grep/awk fallback 존재 확인'

technical_notes:
  - 'blog-b19(resume.sh)는 blog-5i1(pause.sh) 완료 후 진행 — /tmp/multi-agent-pause-state.json 구조가 확정되어야 파싱 코드 작성 가능'
  - 'bash 3.2: 배열 미사용, worktree 목록은 공백 구분 문자열로 누적'
  - 'set -e 사용 시 git stash pop 실패(stash 없음 등) 가 스크립트를 종료하지 않도록 || true 처리 필요'
  - 'pause.sh에서 stash 생성 여부 확인: git stash list 보다 git status --porcelain 으로 사전 확인하는 방식 권장 (빈 stash 방지)'
  - 'tmux send-keys -l 플래그: 특수문자를 키 바인딩으로 해석하지 않고 리터럴로 전송 (start.sh dispatcher.sh 방식 준용)'
  - 'pause.sh에서 JSON 직접 작성 시 경로에 공백 포함 가능성 고려 — 경로를 큰따옴표로 감싸야 함'
  - 'dispatcher 재시작 전 3초 대기: opencode interactive 세션이 안정화되는 시간 확보'
