agents:
  consultant:
    pane: 0
    role: 사람 대면 인터페이스
    permissions:
      read:
      - '**/*'
      code: false
      git: false
  task-manager:
    pane: 1
    role: beads 태스크 관리
    permissions:
      read:
      - '**/*'
      code: false
      git: 
      - stat
      - status
      - log
      - diff
      - branch
      - commit
  spec-manager:
    pane: 2
    role: 명세서 검증
    permissions:
      read:
      - '**/*'
      write:
      - docs/
      - .multi-agent/specs/
      code: false
      git: false
  worker-1:
    pane: 3
    role: 코드 작성 및 테스트 작성
    permissions:
      read:
      - '**/*'
      write:
      - src/
      - tests/
      code: true
      git:
      - stat
      - status
      - log
      - diff
      - branch
      - commit
  worker-2:
    pane: 4
    role: 코드 작성 및 테스트 작성
    permissions:
      read:
      - '**/*'
      write:
      - src/
      - tests/
      code: true
      git:
      - stat
      - status
      - log
      - diff
      - branch
      - commit
global:
  max_workers: 2
  beads_sync_interval: 60
  watchman_enabled: true
  message_retention: 3600
